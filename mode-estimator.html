<style>
  :root{--bg:#0d0d0f;--surface:#1a1a1f;--surface2:#24242b;--border:#2e2e38;--gold:#c9a84c;--gold-light:#e8c96a;--text:#e8e4d9;--text-muted:#9a98a3;--text-dim:#5c5a66;--green:#5fc487;--blue:#75a7e8;--yellow:#e0bf63;--red:#e07070}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;font-size:15px;line-height:1.65;padding-bottom:48px}
  header{background:linear-gradient(135deg,#1a1008 0%,#0d0d0f 62%);border-bottom:1px solid var(--gold);padding:14px 20px 18px;text-align:center}
  .top-link{display:inline-flex;color:var(--gold);font-size:12px;font-weight:700;text-decoration:none;margin:0 3px 8px;padding:4px 8px;border:1px solid rgba(201,168,76,.35);border-radius:6px}
  h1{font-size:18px;color:var(--gold-light);margin:0;letter-spacing:.04em}
  header p{font-size:12px;color:var(--text-muted);margin:4px 0 0}
  .container{max-width:520px;margin:0 auto;padding:0 16px}
  .section{margin-top:20px}
  .section-label{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--gold);margin-bottom:10px;padding-left:8px;border-left:2px solid var(--gold)}
  .section-lead{font-size:13px;color:var(--text-muted);margin:-4px 0 10px 10px}
  .card,.result-box,.notice,details{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:10px}
  .axis{padding:12px 0;border-bottom:1px solid var(--border)}
  .axis:first-child{padding-top:0}.axis:last-child{border-bottom:0;padding-bottom:0}
  .axis-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px}
  .option-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .option{display:flex;align-items:center;min-height:44px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text-muted);cursor:pointer;font-size:13px;font-weight:700;line-height:1.35;padding:9px 10px}
  .option input{position:absolute;opacity:0;pointer-events:none}
  .option:has(input:checked){border-color:var(--gold);color:var(--gold-light);background:rgba(201,168,76,.12)}
  .field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .field-label{display:block;color:var(--text-muted);font-size:12px;font-weight:700;margin-bottom:6px}
  .number-input{width:100%;min-height:44px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:16px;padding:9px 10px}
  .check-option{margin-top:10px}
  .start-row{display:grid;grid-template-columns:auto 1fr;gap:10px;align-items:center;margin-top:10px}
  .start-row .field-label{margin:0}
  .start-row .number-input{min-height:40px}
  .interval-list{display:grid;gap:8px;margin:6px 0}
  .interval-header,.interval-line{display:grid;grid-template-columns:1fr 72px 40px 40px;gap:6px;align-items:center}
  .interval-header{color:var(--text-muted);font-size:11px;font-weight:700;padding:0 4px}
  .interval-row{background:rgba(255,255,255,.025);border:1px solid var(--border);border-radius:6px;padding:7px}
  .interval-row.current .interval-line{grid-template-columns:1fr 72px 40px 40px}
  .interval-row-title{color:var(--gold-light);font-size:12px;font-weight:700}
  .interval-line .number-input{min-width:0;min-height:40px;font-size:15px;padding:7px 8px}
  .include-check{display:grid;place-items:center;min-width:40px;min-height:40px}
  .include-check input{width:20px;height:20px;margin:0}
  .effective-value{font-size:11px;color:var(--text-muted);line-height:1.35;margin-top:4px}
  .effective-value::before{content:attr(data-label) "・"}
  .effective-value.warn{color:var(--red);font-weight:700}
  .add-button,.delete-button{border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);font-weight:700;cursor:pointer}
  .add-button{width:100%;min-height:42px;margin-top:6px}
  .delete-button{min-width:40px;height:40px;color:var(--text-muted);font-size:18px;line-height:1}
  .delete-spacer{width:40px;height:40px}
  .badge{display:inline-flex;align-items:center;border-radius:999px;font-size:12px;font-weight:700;padding:5px 10px;margin-bottom:10px;border:1px solid currentColor}
  .badge.strong{color:var(--green);background:rgba(95,196,135,.1)}.badge.lean-b{color:var(--blue);background:rgba(117,167,232,.1)}.badge.middle{color:var(--yellow);background:rgba(224,191,99,.1)}.badge.weak{color:var(--red);background:rgba(224,112,112,.1)}
  .current-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px}
  .current-head .badge{flex:0 0 auto;margin:0}
  .current-headline{color:var(--gold-light);font-size:18px;font-weight:700;line-height:1.45}
  .reference-box{background:rgba(255,255,255,.02);border-color:rgba(201,168,76,.18);margin-top:16px}
  .heading-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .heading-row h2,.heading-row h3{margin:0}
  .reference-tag{border:1px solid var(--border);border-radius:999px;color:var(--text-muted);font-size:11px;font-weight:700;padding:2px 7px}
  h2{font-size:15px;color:var(--gold-light);margin:0 0 10px}
  h3{font-size:13px;color:var(--text);margin:16px 0 8px}
  p{margin:0 0 10px;color:var(--text-muted)}
  .mode-row{display:grid;grid-template-columns:minmax(72px,96px) 1fr 54px;gap:8px;align-items:center;margin:8px 0;font-size:13px}
  .mode-row.range-row{grid-template-columns:minmax(72px,96px) 1fr 82px}
  .bar-track{height:10px;background:var(--surface2);border-radius:999px;overflow:hidden;position:relative}
  .bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:999px}
  .not-a-meter{display:grid;grid-template-columns:1fr auto;gap:10px;align-items:center;margin-bottom:12px}
  .not-a-meter .bar-track{height:16px;grid-column:1 / -1}
  .not-a-value{color:var(--gold-light);font-size:22px;font-weight:800;line-height:1}
  .criteria-table{font-size:12px;margin:4px 0 10px}
  .criteria-table th,.criteria-table td{padding:6px;border-bottom-color:rgba(46,46,56,.75)}
  .bar-min,.bar-range{height:100%;position:absolute;top:0;border-radius:999px}
  .bar-min{left:0;background:linear-gradient(90deg,var(--gold),var(--gold-light));z-index:2}
  .bar-range{background:var(--gold);opacity:.35;z-index:1}
  .percent{text-align:right;color:var(--gold-light);font-weight:700}
  .note{font-size:12px;color:var(--text-muted);background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.22);border-radius:6px;padding:10px;margin-top:10px}
  table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:13px}
  th,td{border-bottom:1px solid var(--border);padding:9px 6px;text-align:left;vertical-align:top;word-break:break-word}
  th{color:var(--text-muted);font-weight:700}
  .notice{border-color:rgba(224,191,99,.4);background:rgba(224,191,99,.08);font-size:13px}
  .notice ul{margin:0 0 0 1.2em;padding:0;color:var(--text-muted)}
  .notice li{margin-bottom:8px}
  details{padding:0}
  summary{cursor:pointer;color:var(--gold-light);font-size:14px;font-weight:700;padding:14px 16px}
  .details-body{padding:0 16px 16px}
  .source{font-size:12px;color:var(--text-dim);margin-top:12px}
  .source a{color:var(--gold);text-decoration:none}
  footer{text-align:center;padding:36px 16px;color:var(--text-dim);font-size:12px}footer nav{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:10px}footer a{color:var(--text-muted);text-decoration:none}
  @media (max-width:420px){.option-grid,.field-grid{grid-template-columns:1fr}.mode-row{grid-template-columns:80px 1fr 48px}.mode-row.range-row{grid-template-columns:74px 1fr 82px}.current-head{display:block}.current-head .badge{margin-top:8px}th,td{font-size:12px;padding:8px 5px}}
</style>

<script>
const MACHINE_REGISTRY = {
  "nangoku-sp": "assets/data/mode-estimator/nangoku-sp.js"
};
const DEFAULT_MACHINE_ID = "nangoku-sp";
let machine = null;

function escapeHtml(value){
  return String(value).replace(/[&<>"']/g, char => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;", "'":"&#39;" }[char]));
}
function selectedMachineId(){
  const params = new URLSearchParams(location.search);
  const id = params.get("machine") || DEFAULT_MACHINE_ID;
  return MACHINE_REGISTRY[id] ? id : DEFAULT_MACHINE_ID;
}
function loadMachine(){
  const script = document.createElement("script");
  script.src = MACHINE_REGISTRY[selectedMachineId()];
  script.onload = () => {
    machine = window.MODE_ESTIMATOR_MACHINE_DATA;
    renderPage();
  };
  script.onerror = () => {
    document.getElementById("resultArea").innerHTML = "<p>機種データを読み込めませんでした。</p>";
  };
  document.head.appendChild(script);
}
function renderPage(){
  document.getElementById("machineLead").textContent = `${machine.name}の起点、初当たりG数、ボーナス結果から推定します。`;
  renderInputs();
  renderDisclaimers();
  renderReference();
  renderSource();
  renderResult();
  renderReplayFlashSection();
}
function renderInputs(){
  const inputArea = document.getElementById("inputArea");
  inputArea.innerHTML = machine.axes.map(axis => `
    <div class="axis">
      <div class="axis-title">${escapeHtml(axis.label)}</div>
      <div class="option-grid">
        ${axis.options.map((option, index) => {
          const checked = axis.id === "result" ? option.id === "noHisyou" : index === 0;
          return `
          <label class="option">
            <input type="radio" name="${escapeHtml(axis.id)}" value="${escapeHtml(option.id)}" ${checked ? "checked" : ""}>
            <span>${escapeHtml(option.label)}</span>
          </label>
        `}).join("")}
      </div>
    </div>
  `).join("");
  inputArea.querySelectorAll("input").forEach(input => input.addEventListener("change", renderResult));
}
function selection(){
  return Object.fromEntries(machine.axes.map(axis => [axis.id, document.querySelector(`input[name="${axis.id}"]:checked`).value]));
}
function baseCaseKey(values){
  return `${values.origin}-${values.firstHit}`;
}
function renderModeRows(rows){
  return rows.map(row => `
    <div class="mode-row">
      <div>${escapeHtml(row.mode)}</div>
      <div class="bar-track"><div class="bar" style="width:${Math.max(0, Math.min(100, row.percent))}%"></div></div>
      <div class="percent">${row.percent.toFixed(1)}%</div>
    </div>
  `).join("");
}
function clampPercent(value){
  return Math.max(0, Math.min(100, value));
}
function renderRangeRows(rows){
  return rows.map(row => {
    const min = clampPercent(row.min);
    const max = clampPercent(row.max);
    return `
      <div class="mode-row range-row">
        <div>${escapeHtml(row.mode)}</div>
        <div class="bar-track">
          <div class="bar-range" style="left:${min}%;width:${Math.max(0, max - min)}%"></div>
          <div class="bar-min" style="width:${min}%"></div>
        </div>
        <div class="percent">${row.min.toFixed(1)}〜${row.max.toFixed(1)}%</div>
      </div>
    `;
  }).join("");
}
function badgeForNotA(percent){
  if(percent >= 75){
    return { level: "strong", label: "A否定・強" };
  }
  if(percent >= 60){
    return { level: "lean-b", label: "A否定・やや強" };
  }
  if(percent >= 40){
    return { level: "middle", label: "判定困難" };
  }
  return { level: "weak", label: "A否定できず" };
}
function replayFlashOriginId(replayFlash){
  const checked = document.querySelector('input[name="repflashOrigin"]:checked');
  if(checked && replayFlash.priors[checked.value]){
    return checked.value;
  }
  return Object.keys(replayFlash.priors)[0];
}
function replayFlashPrior(replayFlash){
  const prior = replayFlash.priors[replayFlashOriginId(replayFlash)];
  if(document.getElementById("repflashOver200")?.checked){
    return window.RepflashBayes.applyExclusions(prior, replayFlash.over200Excludes);
  }
  return window.RepflashBayes.normalizePrior(prior);
}
function numberInputValue(id){
  const value = Number(document.getElementById(id)?.value || 0);
  return Number.isFinite(value) && value > 0 ? value : 0;
}
function effectiveGamesForInterval(rawGames, startGames, index){
  if(!Number.isFinite(rawGames) || rawGames <= 0){
    return 0;
  }
  const effective = index === 0 ? rawGames - startGames : rawGames - 41;
  return effective > 0 ? effective : 0;
}
function renderEffectiveStatus(element, effective, isIncluded){
  if(!element){
    return;
  }
  element.classList.toggle("warn", !isIncluded || effective <= 0);
  element.textContent = isIncluded && effective > 0
    ? `実効${effective}G`
    : "実効0（対象外）";
}
function replayFlashObservedTotals(){
  const startGames = numberInputValue("repflashStartGames");
  const rows = Array.from(document.querySelectorAll(".repflash-win-row"));
  let totalGames = 0;
  let totalCount = 0;

  rows.forEach((row, index) => {
    const winGames = Number(row.querySelector(".repflash-win-games")?.value || 0);
    const count = Number(row.querySelector(".repflash-win-count")?.value || 0);
    const include = row.querySelector(".repflash-include")?.checked !== false;
    const effective = effectiveGamesForInterval(winGames, startGames, index);
    renderEffectiveStatus(row.querySelector(".effective-value"), effective, include);
    if(include && effective > 0){
      totalGames += effective;
      totalCount += Number.isFinite(count) && count > 0 ? count : 0;
    }
  });

  const currentInput = document.getElementById("repflashCurrentGames");
  const currentGames = Number(currentInput?.value || 0);
  const currentEntered = Boolean(currentInput?.value);
  const currentInclude = document.getElementById("repflashCurrentInclude")?.checked !== false;
  const currentEffective = currentEntered ? effectiveGamesForInterval(currentGames, startGames, rows.length) : 0;
  renderEffectiveStatus(document.getElementById("repflashCurrentEffective"), currentEffective, currentEntered && currentInclude);
  if(currentEntered && currentInclude && currentEffective > 0){
    const currentCount = Number(document.getElementById("repflashCurrentCount")?.value || 0);
    totalGames += currentEffective;
    totalCount += Number.isFinite(currentCount) && currentCount > 0 ? currentCount : 0;
  }

  return { games: totalGames, count: totalCount };
}
function renderReplayFlashOutput(){
  const replayFlash = machine.replayFlash;
  if(!replayFlash || !window.RepflashBayes){
    return;
  }
  const outputArea = document.getElementById("repflashResultArea");
  if(!outputArea){
    return;
  }
  const totals = replayFlashObservedTotals();
  const prior = replayFlashPrior(replayFlash);
  if(totals.games <= 0){
    outputArea.innerHTML = `
      <div class="result-box">
        <p class="note">実効観測 ${totals.games}G／リプフラ${totals.count}回</p>
        <h2>事前分布（観測未入力）</h2>
        ${renderModeRows(Object.entries(prior).map(([mode, percent]) => ({ mode, percent })))}
      </div>
    `;
    return;
  }
  const result = window.RepflashBayes.estimate({
    rates: replayFlash.rates,
    prior,
    games: totals.games,
    count: totals.count,
    aMode: replayFlash.aMode
  });
  const badge = badgeForNotA(result.pNotA);
  outputArea.innerHTML = `
    <div class="result-box">
      <p class="note">実効観測 ${totals.games}G／リプフラ${totals.count}回</p>
      <h2>A否定度 P(通常B以上)</h2>
      <div class="not-a-meter">
        <div class="not-a-value">${result.pNotA.toFixed(1)}%</div>
        <div class="badge ${escapeHtml(badge.level)}">${escapeHtml(badge.label)}</div>
        <div class="bar-track"><div class="bar" style="width:${clampPercent(result.pNotA)}%"></div></div>
      </div>
      <table class="criteria-table">
        <tbody>
          <tr><th>〜40%</th><td>A否定できず</td></tr>
          <tr><th>40〜60%</th><td>判定困難</td></tr>
          <tr><th>60〜75%</th><td>A否定・やや強</td></tr>
          <tr><th>75%〜</th><td>A否定・強</td></tr>
        </tbody>
      </table>
      <p class="note">本表示はリプフラ回数と観測G数のみからの確率推定であり、実際のモード・結果を保証するものではありません</p>
      <h3>事後モード割合</h3>
      ${renderModeRows(Object.entries(result.posterior).map(([mode, percent]) => ({ mode, percent })))}
    </div>
  `;
}
function bindReplayFlashInputs(scope){
  scope.querySelectorAll("input").forEach(input => input.addEventListener("input", renderReplayFlashOutput));
  scope.querySelectorAll('input[type="radio"],input[type="checkbox"]').forEach(input => input.addEventListener("change", renderReplayFlashOutput));
}
function addReplayFlashWinRow(){
  const list = document.getElementById("repflashWinList");
  if(!list){
    return;
  }
  const row = document.createElement("div");
  row.className = "interval-row repflash-win-row";
  row.innerHTML = `
    <div class="interval-line">
      <input class="number-input repflash-win-games" type="number" inputmode="numeric" min="0" step="1" aria-label="当選G数">
      <input class="number-input repflash-win-count" type="number" inputmode="numeric" min="0" step="1" value="0" aria-label="その区間のリプフラ回数">
      <label class="include-check">
        <input class="repflash-include" type="checkbox" checked aria-label="計算に含める">
      </label>
      <button class="delete-button" type="button" aria-label="区間を削除">×</button>
    </div>
    <div class="effective-value" data-label="区間">実効0（対象外）</div>
  `;
  row.querySelector(".delete-button").addEventListener("click", () => {
    row.remove();
    updateReplayFlashWinRowTitles();
    renderReplayFlashOutput();
  });
  list.appendChild(row);
  bindReplayFlashInputs(row);
  updateReplayFlashWinRowTitles();
  renderReplayFlashOutput();
}
function updateReplayFlashWinRowTitles(){
  document.querySelectorAll(".repflash-win-row .effective-value").forEach((caption, index) => {
    caption.dataset.label = `区間${index + 1}`;
  });
}
function renderReplayFlashSection(){
  const existing = document.getElementById("repflashSection");
  if(existing){
    existing.remove();
  }
  const replayFlash = machine.replayFlash;
  if(!replayFlash || !window.RepflashBayes){
    return;
  }
  const section = document.createElement("section");
  section.className = "section";
  section.id = "repflashSection";
  section.innerHTML = `
    <div class="section-label">リプフラ判定（A否定）</div>
    <p class="section-lead">モードA（通常A）をどれだけ否定できているかを数値で示します</p>
    <div class="card" id="repflashInputArea">
      <div class="axis">
        <div class="axis-title">起点</div>
        <div class="option-grid">
          ${Object.entries(replayFlash.priors).map(([origin, values], index) => `
            <label class="option">
              <input type="radio" name="repflashOrigin" value="${escapeHtml(origin)}" ${index === 0 ? "checked" : ""}>
              <span>${escapeHtml(replayFlash.originLabels[origin] || origin)}</span>
            </label>
          `).join("")}
        </div>
      </div>
      <label class="option check-option">
        <input type="checkbox" id="repflashOver200">
        <span>内部200G超えを確認済み（チャンス・飛翔準備B・超飛翔準備を否定）</span>
      </label>
      <div class="start-row">
        <span class="field-label">開始G数</span>
        <input class="number-input" id="repflashStartGames" type="number" inputmode="numeric" min="0" step="1" value="0" aria-label="開始G数">
      </div>
      <h3>当選区間リスト</h3>
      <div class="interval-header" aria-hidden="true">
        <span>当選G数</span><span>回数</span><span>含む</span><span></span>
      </div>
      <div class="interval-list" id="repflashWinList"></div>
      <button class="add-button" id="repflashAddRow" type="button">＋区間を追加</button>
      <h3>進行中区間</h3>
      <div class="interval-header" aria-hidden="true">
        <span>現在G数</span><span>回数</span><span>含む</span><span></span>
      </div>
      <div class="interval-row current">
        <div class="interval-line">
          <input class="number-input" id="repflashCurrentGames" type="number" inputmode="numeric" min="0" step="1" aria-label="現在G数（未当選）">
          <input class="number-input" id="repflashCurrentCount" type="number" inputmode="numeric" min="0" step="1" value="0" aria-label="リプフラ回数">
          <label class="include-check">
            <input id="repflashCurrentInclude" type="checkbox" checked aria-label="計算に含める">
          </label>
          <div class="delete-spacer" aria-hidden="true"></div>
        </div>
        <div class="effective-value" id="repflashCurrentEffective" data-label="進行中">実効0（対象外）</div>
      </div>
    </div>
    <div id="repflashResultArea"></div>
    <div class="notice">
      <ul>
        <li>当選G数・当選契機によるモード推論（200G以内当選ならチャンス寄り等）は一切組み込んでいない。リプフラ回数と観測G数のみの単純計算</li>
        <li>2区間目以降と進行中区間は、ボーナス後のバタフライ＋ときめき約41Gを自動控除済み（手計算不要）</li>
        <li>区間を計算から外す使い方は、リールフラッシュ等の別示唆でその区間のモードが異なると判断した場合を想定。事前分布は起点の初期振り分けのまま</li>
        <li>飛翔・超飛翔終了直後から自分で続行して打つ場合は、開始G数に42を入力する（終了直後の約41Gはリプフラ対象外のため）</li>
      </ul>
    </div>
  `;
  const firstSection = document.querySelector("main .section");
  firstSection.before(section);
  document.getElementById("repflashAddRow").addEventListener("click", addReplayFlashWinRow);
  bindReplayFlashInputs(section);
  renderReplayFlashOutput();
}
function renderCurrentState(data){
  return `
    <div class="result-box">
      <div class="current-head">
        <div>
          <h2>今の状態</h2>
          <div class="current-headline">${escapeHtml(data.currentState.headline)}</div>
        </div>
        <div class="badge ${escapeHtml(data.evaluation.level)}">${escapeHtml(data.evaluation.label)}</div>
      </div>
      <p>${escapeHtml(data.currentState.text)}</p>
      <p class="note">${escapeHtml(data.evaluation.text)}</p>
    </div>
  `;
}
function renderAfterNoHisyou(data){
  if(data.type === "range-table"){
    return `
      <div class="result-box">
      <h3>直前に滞在していたモード（推定レンジ）</h3>
      ${data.note ? `<p class="note">${escapeHtml(data.note)}</p>` : ""}
      ${renderRangeRows(data.rows)}
      </div>
    `;
  }
  return `
    <div class="result-box">
      <h3>直前に滞在していたモード（推定）</h3>
      <p>${escapeHtml(data.text)}</p>
    </div>
  `;
}
function renderNextHit(rows){
  return `
    <div class="result-box">
    <h3>次回当選G数別の見方</h3>
    <table>
      <thead><tr><th>次回当選</th><th>見方</th></tr></thead>
      <tbody>${rows.map(row => `<tr><td>${escapeHtml(row.range)}</td><td>${escapeHtml(row.view)}</td></tr>`).join("")}</tbody>
    </table>
    </div>
  `;
}
function renderResult(){
  const values = selection();
  const data = machine.cases[baseCaseKey(values)];
  const isToHisyou = values.result === "toHisyou";
  if(!data){
    document.getElementById("resultArea").innerHTML = "<p>該当する推定データがありません。</p>";
    return;
  }
  const hitModesBlock = `
    <div class="result-box ${isToHisyou ? "" : "reference-box"}">
      ${isToHisyou ? `<h2>当選時点のモード割合</h2>` : `<div class="heading-row"><h2>当選時点のモード割合（参考）</h2><span class="reference-tag">参考</span></div>`}
      ${renderModeRows(data.hitModes)}
      ${data.hitModesNote ? `<p class="note">${escapeHtml(data.hitModesNote)}</p>` : ""}
      ${isToHisyou ? `<p class="note">${escapeHtml(machine.toHisyouNote)}</p>` : ""}
    </div>
  `;
  document.getElementById("resultArea").innerHTML = isToHisyou
    ? hitModesBlock
    : `${renderCurrentState(data)}${renderAfterNoHisyou(data.afterNoHisyou)}${hitModesBlock}${renderNextHit(data.nextHit)}`;
}
function renderDisclaimers(){
  document.getElementById("disclaimerArea").innerHTML = `<ul>${machine.disclaimers.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
}
function renderReference(){
  const initialRows = Object.entries(machine.reference.initialDistribution).map(([origin, values]) => {
    const originLabel = machine.axes[0].options.find(option => option.id === origin)?.label || origin;
    return `<h3>${escapeHtml(originLabel)}</h3>${renderModeRows(Object.entries(values).map(([mode, percent]) => ({ mode, percent })))}`;
  }).join("");
  document.getElementById("referenceArea").innerHTML = `
    <h3>天井一覧</h3>
    <table>
      <thead><tr><th>モード</th><th>天井</th></tr></thead>
      <tbody>${machine.reference.ceilings.map(row => `<tr><td>${escapeHtml(row.mode)}</td><td>${escapeHtml(row.ceiling)}</td></tr>`).join("")}</tbody>
    </table>
    <h3>初期振り分け</h3>
    ${initialRows}
  `;
}
function renderSource(){
  document.getElementById("sourceArea").innerHTML = `出典：<a href="${escapeHtml(machine.sourceUrl)}" target="_blank" rel="noopener">${escapeHtml(machine.sourceName)}</a> / データ確認日：${escapeHtml(machine.lastUpdated)}`;
}
loadMachine();
</script>
</body>
</html>
