<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>モード推測ツール | slot-tools.jp</title>
<meta name="description" content="L南国育ち SPECIALの起点、初当たりG数、飛翔突入の有無から滞在モードの推定割合と状態評価を表示する無料ツールです。">
<link rel="canonical" href="https://slot-tools.jp/mode-estimator.html">
<style>
  :root{--bg:#0d0d0f;--surface:#1a1a1f;--surface2:#24242b;--border:#2e2e38;--gold:#c9a84c;--gold-light:#e8c96a;--text:#e8e4d9;--text-muted:#9a98a3;--text-dim:#5c5a66;--green:#5fc487;--blue:#75a7e8;--yellow:#e0bf63;--red:#e07070}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;font-size:15px;line-height:1.65;padding-bottom:48px}
  header{background:linear-gradient(135deg,#1a1008 0%,#0d0d0f 62%);border-bottom:1px solid var(--gold);padding:14px 20px 18px;text-align:center}
  .top-link{display:inline-flex;color:var(--gold);font-size:12px;font-weight:700;text-decoration:none;margin:0 3px 8px;padding:4px 8px;border:1px solid rgba(201,168,76,.35);border-radius:6px}
  h1{font-size:18px;color:var(--gold-light);margin:0;letter-spacing:.04em}
  header p{font-size:12px;color:var(--text-muted);margin:4px 0 0}
  .container{max-width:520px;margin:0 auto;padding:0 16px}
  .section{margin-top:20px}
  .section-label{font-size:11px;font-weight:700;letter-spacing:.1em;color:var(--gold);margin-bottom:10px;padding-left:8px;border-left:2px solid var(--gold)}
  .card,.result-box,.notice,details{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:10px}
  .axis{padding:12px 0;border-bottom:1px solid var(--border)}
  .axis:first-child{padding-top:0}.axis:last-child{border-bottom:0;padding-bottom:0}
  .axis-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:8px}
  .option-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .option{display:flex;align-items:center;min-height:44px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text-muted);cursor:pointer;font-size:13px;font-weight:700;line-height:1.35;padding:9px 10px}
  .option input{position:absolute;opacity:0;pointer-events:none}
  .option:has(input:checked){border-color:var(--gold);color:var(--gold-light);background:rgba(201,168,76,.12)}
  .badge{display:inline-flex;align-items:center;border-radius:999px;font-size:12px;font-weight:700;padding:5px 10px;margin-bottom:10px;border:1px solid currentColor}
  .badge.strong{color:var(--green);background:rgba(95,196,135,.1)}.badge.lean-b{color:var(--blue);background:rgba(117,167,232,.1)}.badge.middle{color:var(--yellow);background:rgba(224,191,99,.1)}.badge.weak{color:var(--red);background:rgba(224,112,112,.1)}
  h2{font-size:15px;color:var(--gold-light);margin:0 0 10px}
  h3{font-size:13px;color:var(--text);margin:16px 0 8px}
  p{margin:0 0 10px;color:var(--text-muted)}
  .mode-row{display:grid;grid-template-columns:minmax(72px,96px) 1fr 54px;gap:8px;align-items:center;margin:8px 0;font-size:13px}
  .bar-track{height:10px;background:var(--surface2);border-radius:999px;overflow:hidden}
  .bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold-light));border-radius:999px}
  .percent{text-align:right;color:var(--gold-light);font-weight:700}
  .note{font-size:12px;color:var(--text-muted);background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.22);border-radius:6px;padding:10px;margin-top:10px}
  table{width:100%;border-collapse:collapse;table-layout:fixed;font-size:13px}
  th,td{border-bottom:1px solid var(--border);padding:9px 6px;text-align:left;vertical-align:top;word-break:break-word}
  th{color:var(--text-muted);font-weight:700}
  .notice{border-color:rgba(224,191,99,.4);background:rgba(224,191,99,.08);font-size:13px}
  .notice ul{margin:0 0 0 1.2em;padding:0;color:var(--text-muted)}
  .notice li{margin-bottom:8px}
  details{padding:0}
  summary{cursor:pointer;color:var(--gold-light);font-size:14px;font-weight:700;padding:14px 16px}
  .details-body{padding:0 16px 16px}
  .source{font-size:12px;color:var(--text-dim);margin-top:12px}
  .source a{color:var(--gold);text-decoration:none}
  footer{text-align:center;padding:36px 16px;color:var(--text-dim);font-size:12px}footer nav{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:10px}footer a{color:var(--text-muted);text-decoration:none}
  @media (max-width:420px){.option-grid{grid-template-columns:1fr}.mode-row{grid-template-columns:80px 1fr 48px}th,td{font-size:12px;padding:8px 5px}}
</style>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6389066329814944"
     crossorigin="anonymous"></script>
</head>
<body>
<header>
  <a class="top-link" href="index.html">TOP</a>
  <a class="top-link" href="guide/mode-estimator.html">使い方・詳しい説明 →</a>
  <h1>モード推測ツール</h1>
  <p id="machineLead">条件から滞在モードの推定割合を表示します。</p>
</header>

<main class="container">
  <section class="section">
    <div class="section-label">入力</div>
    <div class="card" id="inputArea"></div>
  </section>

  <section class="section">
    <div class="section-label">結果</div>
    <div class="result-box" id="resultArea"></div>
    <div class="notice" id="disclaimerArea"></div>
  </section>

  <section class="section">
    <details>
      <summary>参考情報：天井と初期振り分け</summary>
      <div class="details-body" id="referenceArea"></div>
    </details>
    <p class="source" id="sourceArea"></p>
  </section>
</main>

<footer>
  <p>&copy; 2026 slot-tools.jp</p>
  <nav><a href="/about.html">運営者情報</a><a href="/privacy.html">プライバシーポリシー</a><a href="/disclaimer.html">免責事項</a><a href="/contact.html">お問い合わせ</a></nav>
</footer>

<script>
const MACHINE_REGISTRY = {
  "nangoku-sp": "assets/data/mode-estimator/nangoku-sp.js"
};
const DEFAULT_MACHINE_ID = "nangoku-sp";
let machine = null;

function escapeHtml(value){
  return String(value).replace(/[&<>"']/g, char => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;", "'":"&#39;" }[char]));
}
function selectedMachineId(){
  const params = new URLSearchParams(location.search);
  const id = params.get("machine") || DEFAULT_MACHINE_ID;
  return MACHINE_REGISTRY[id] ? id : DEFAULT_MACHINE_ID;
}
function loadMachine(){
  const script = document.createElement("script");
  script.src = MACHINE_REGISTRY[selectedMachineId()];
  script.onload = () => {
    machine = window.MODE_ESTIMATOR_MACHINE_DATA;
    renderPage();
  };
  script.onerror = () => {
    document.getElementById("resultArea").innerHTML = "<p>機種データを読み込めませんでした。</p>";
  };
  document.head.appendChild(script);
}
function renderPage(){
  document.getElementById("machineLead").textContent = `${machine.name}の起点、初当たりG数、ボーナス結果から推定します。`;
  renderInputs();
  renderDisclaimers();
  renderReference();
  renderSource();
  renderResult();
}
function renderInputs(){
  const inputArea = document.getElementById("inputArea");
  inputArea.innerHTML = machine.axes.map(axis => `
    <div class="axis">
      <div class="axis-title">${escapeHtml(axis.label)}</div>
      <div class="option-grid">
        ${axis.options.map((option, index) => {
          const checked = axis.id === "result" ? option.id === "noHisyou" : index === 0;
          return `
          <label class="option">
            <input type="radio" name="${escapeHtml(axis.id)}" value="${escapeHtml(option.id)}" ${checked ? "checked" : ""}>
            <span>${escapeHtml(option.label)}</span>
          </label>
        `}).join("")}
      </div>
    </div>
  `).join("");
  inputArea.querySelectorAll("input").forEach(input => input.addEventListener("change", renderResult));
}
function selection(){
  return Object.fromEntries(machine.axes.map(axis => [axis.id, document.querySelector(`input[name="${axis.id}"]:checked`).value]));
}
function baseCaseKey(values){
  return `${values.origin}-${values.firstHit}`;
}
function renderModeRows(rows){
  return rows.map(row => `
    <div class="mode-row">
      <div>${escapeHtml(row.mode)}</div>
      <div class="bar-track"><div class="bar" style="width:${Math.max(0, Math.min(100, row.percent))}%"></div></div>
      <div class="percent">${row.percent.toFixed(1)}%</div>
    </div>
  `).join("");
}
function renderAfterNoHisyou(data){
  if(data.type === "table"){
    return `
      <h3>単発抜け後の元モード推定</h3>
      ${data.note ? `<p class="note">${escapeHtml(data.note)}</p>` : ""}
      ${renderModeRows(data.rows)}
    `;
  }
  return `<h3>単発抜け後の元モード推定</h3><p>${escapeHtml(data.text)}</p>`;
}
function renderNextHit(rows){
  return `
    <h3>次回当選G数別の見方</h3>
    <table>
      <thead><tr><th>次回当選</th><th>見方</th></tr></thead>
      <tbody>${rows.map(row => `<tr><td>${escapeHtml(row.range)}</td><td>${escapeHtml(row.view)}</td></tr>`).join("")}</tbody>
    </table>
  `;
}
function renderResult(){
  const values = selection();
  const data = machine.cases[baseCaseKey(values)];
  const isToHisyou = values.result === "toHisyou";
  if(!data){
    document.getElementById("resultArea").innerHTML = "<p>該当する推定データがありません。</p>";
    return;
  }
  document.getElementById("resultArea").innerHTML = `
    ${!isToHisyou ? `<div class="badge ${escapeHtml(data.evaluation.level)}">${escapeHtml(data.evaluation.label)}</div><p>${escapeHtml(data.evaluation.text)}</p>` : ""}
    <h2>当選時点のモード割合</h2>
    ${renderModeRows(data.hitModes)}
    ${data.hitModesNote ? `<p class="note">${escapeHtml(data.hitModesNote)}</p>` : ""}
    ${isToHisyou ? `<p class="note">${escapeHtml(machine.toHisyouNote)}</p>` : `${renderAfterNoHisyou(data.afterNoHisyou)}${renderNextHit(data.nextHit)}`}
  `;
}
function renderDisclaimers(){
  document.getElementById("disclaimerArea").innerHTML = `<ul>${machine.disclaimers.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`;
}
function renderReference(){
  const initialRows = Object.entries(machine.reference.initialDistribution).map(([origin, values]) => {
    const originLabel = machine.axes[0].options.find(option => option.id === origin)?.label || origin;
    return `<h3>${escapeHtml(originLabel)}</h3>${renderModeRows(Object.entries(values).map(([mode, percent]) => ({ mode, percent })))}`;
  }).join("");
  document.getElementById("referenceArea").innerHTML = `
    <h3>天井一覧</h3>
    <table>
      <thead><tr><th>モード</th><th>天井</th></tr></thead>
      <tbody>${machine.reference.ceilings.map(row => `<tr><td>${escapeHtml(row.mode)}</td><td>${escapeHtml(row.ceiling)}</td></tr>`).join("")}</tbody>
    </table>
    <h3>初期振り分け</h3>
    ${initialRows}
  `;
}
function renderSource(){
  document.getElementById("sourceArea").innerHTML = `出典：<a href="${escapeHtml(machine.sourceUrl)}" target="_blank" rel="noopener">${escapeHtml(machine.sourceName)}</a> / データ確認日：${escapeHtml(machine.lastUpdated)}`;
}
loadMachine();
</script>
</body>
</html>
